<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=JetBrains+Mono:wght@400;600&display=block" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>__THEME_ROOT__</style>
    <style>__AMBIENT_CSS__</style>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: var(--canvas);
        font-family: "EB Garamond", serif;
        color: var(--ink);
      }
      .canvas { position: relative; width: 100%; height: 100%; overflow: hidden; }
      .ambient { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
      .scene {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 200px 90px;
        gap: 36px;
        z-index: 2;
      }
      .label {
        font-family: "JetBrains Mono", monospace;
        font-size: 26px;
        letter-spacing: 0.22em;
        color: var(--accent);
        text-transform: uppercase;
      }
      .energy-chip {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        letter-spacing: 0.22em;
        color: var(--chip);
        text-transform: uppercase;
      }
      .hook {
        font-family: "Archivo Black", sans-serif;
        font-size: 110px;
        line-height: 0.96;
        color: var(--ink);
        letter-spacing: -0.02em;
      }
      .body {
        font-family: "EB Garamond", serif;
        font-style: italic;
        font-size: 46px;
        line-height: 1.4;
        max-width: 900px;
        color: var(--ink);
      }
      .accent-bar {
        width: 120px;
        height: 3px;
        background: var(--accent);
      }
      .footer-tag {
        position: absolute;
        bottom: 80px;
        left: 0; right: 0;
        text-align: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 24px;
        letter-spacing: 0.22em;
        color: var(--border);
        text-transform: uppercase;
        z-index: 3;
      }
      .caption-track {
        position: absolute;
        left: 80px;
        right: 80px;
        bottom: 200px;
        z-index: 4;
        min-height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .caption {
        position: absolute;
        left: 0; right: 0;
        text-align: center;
        font-family: "Archivo Black", sans-serif;
        font-size: 56px;
        line-height: 1.15;
        letter-spacing: -0.01em;
        color: var(--ink);
        text-shadow: 0 4px 24px rgba(0,0,0,0.7), 0 0 40px rgba(0,0,0,0.5);
        padding: 0 40px;
      }
      .scene { opacity: 1; }
      .s2, .s3 { opacity: 0; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="__TOTAL_DURATION__"
      data-width="1080"
      data-height="1920"
    >
      __AUDIO_HTML__
      <div class="canvas">
        <div class="ambient" id="ambient">__AMBIENT_HTML__</div>

        <div class="scene s1" id="scene1">
          <div class="energy-chip" id="s1-energy">__ENERGY_LABEL__</div>
          <div class="label" id="s1-label">__CATEGORY_LABEL__</div>
          <div class="accent-bar" id="s1-bar"></div>
          <div class="hook" id="s1-hook">__HOOK_LINE__</div>
        </div>

        <div class="scene s2" id="scene2">
          <div class="label" id="s2-label">SAJU INSIGHT</div>
          <div class="accent-bar" id="s2-bar"></div>
          <div class="body" id="s2-body">__BODY_TEXT__</div>
        </div>

        <div class="scene s3" id="scene3">
          <div class="label" id="s3-label">FREE READING</div>
          <div class="hook" id="s3-cta" style="font-size:88px;">__CTA_LINE__</div>
          <div class="body" id="s3-url" style="font-size:38px; font-style: normal; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em;">sajumuse.com</div>
        </div>

        <div class="caption-track" id="caption-track">__CAPTIONS_HTML__</div>

        <div class="footer-tag">SAJUMUSE</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const HEAD_EASE = "__HEAD_EASE__";
      const BODY_EASE = "__BODY_EASE__";

      __CAPTIONS_GSAP__

      tl.from("#s1-energy", { y: 20, opacity: 0, duration: 0.45, ease: BODY_EASE }, 0.1);
      tl.from("#s1-label",  { y: 30, opacity: 0, duration: 0.5, ease: BODY_EASE }, 0.25);
      tl.from("#s1-bar",    { scaleX: 0, transformOrigin: "left", duration: 0.55, ease: "expo.out" }, 0.5);
      tl.from("#s1-hook",   { y: 90, opacity: 0, duration: 0.95, ease: HEAD_EASE }, 0.6);

      tl.to("#scene1", { opacity: 0, duration: 0.6, ease: "power2.inOut" }, 6.5);
      tl.set("#scene2", { opacity: 1 }, 6.5);

      tl.from("#s2-label", { y: 30, opacity: 0, duration: 0.5, ease: BODY_EASE }, 7.0);
      tl.from("#s2-bar",   { scaleX: 0, transformOrigin: "left", duration: 0.55, ease: "expo.out" }, 7.25);
      tl.from("#s2-body",  { y: 50, opacity: 0, duration: 0.9, ease: HEAD_EASE }, 7.4);

      tl.to("#scene2", { opacity: 0, duration: 0.6, ease: "power2.inOut" }, 14.0);
      tl.set("#scene3", { opacity: 1 }, 14.0);

      tl.from("#s3-label", { y: 30, opacity: 0, duration: 0.5, ease: BODY_EASE }, 14.4);
      tl.from("#s3-cta",   { y: 60, opacity: 0, duration: 0.8, ease: HEAD_EASE }, 14.7);
      tl.from("#s3-url",   { y: 30, opacity: 0, duration: 0.6, ease: BODY_EASE }, 15.3);

      tl.to("#scene3", { opacity: 0, duration: 0.7, ease: "power2.inOut" }, 19.2);

      const cycle = 8;
      const repeats = Math.ceil(20 / cycle) - 1;
      tl.to("#ambient", {
        opacity: 0.55,
        duration: cycle / 2,
        ease: "sine.inOut",
        yoyo: true,
        repeat: repeats * 2 + 1,
      }, 0);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
