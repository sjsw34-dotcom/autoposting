<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=JetBrains+Mono:wght@400;600&display=block" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>__THEME_ROOT__</style>
    <style>__AMBIENT_CSS__</style>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: var(--canvas);
        font-family: "EB Garamond", serif;
        color: var(--ink);
      }
      .canvas { position: relative; width: 100%; height: 100%; overflow: hidden; }
      .ambient { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
      .scene {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 200px 80px;
        gap: 32px;
        text-align: center;
        z-index: 2;
      }
      .label {
        font-family: "JetBrains Mono", monospace;
        font-size: 26px;
        letter-spacing: 0.18em;
        color: var(--accent);
        text-transform: uppercase;
      }
      .energy-chip {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        letter-spacing: 0.22em;
        color: var(--chip);
        text-transform: uppercase;
      }
      .headline {
        font-family: "Archivo Black", sans-serif;
        font-size: 130px;
        line-height: 0.95;
        color: var(--ink);
        letter-spacing: -0.02em;
      }
      .quote {
        font-family: "EB Garamond", serif;
        font-style: italic;
        font-size: 44px;
        line-height: 1.35;
        max-width: 880px;
        color: var(--ink);
      }
      .footer-tag {
        position: absolute;
        bottom: 80px;
        left: 0; right: 0;
        text-align: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 24px;
        letter-spacing: 0.22em;
        color: var(--border);
        text-transform: uppercase;
        z-index: 3;
      }
      .accent-bar {
        width: 120px;
        height: 3px;
        background: var(--accent);
        transform-origin: left center;
      }
      .caption-track {
        position: absolute;
        left: 80px;
        right: 80px;
        bottom: 200px;
        z-index: 4;
        min-height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .caption {
        position: absolute;
        left: 0; right: 0;
        text-align: center;
        font-family: "Archivo Black", sans-serif;
        font-size: 56px;
        line-height: 1.15;
        letter-spacing: -0.01em;
        color: var(--ink);
        text-shadow: 0 4px 24px rgba(0,0,0,0.7), 0 0 40px rgba(0,0,0,0.5);
        padding: 0 40px;
      }
      .scene { opacity: 1; }
      .s2, .s3 { opacity: 0; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="__TOTAL_DURATION__"
      data-width="1080"
      data-height="1920"
    >
      __AUDIO_HTML__
      <div class="canvas">
        <div class="ambient" id="ambient">__AMBIENT_HTML__</div>

        <div class="scene s1" id="scene1">
          <div class="energy-chip" id="s1-energy">__ENERGY_LABEL__</div>
          <div class="label" id="s1-label">__DATE_LABEL__</div>
          <div class="accent-bar" id="s1-bar"></div>
          <div class="headline" id="s1-headline">__SIGN_HEADLINE__</div>
          <div class="quote" id="s1-quote">__SIGN_SUBLINE__</div>
        </div>

        <div class="scene s2" id="scene2">
          <div class="label" id="s2-label">TODAY'S READING</div>
          <div class="accent-bar" id="s2-bar"></div>
          <div class="quote" id="s2-quote" style="font-size:48px;max-width:920px;">__FORTUNE_TEXT__</div>
        </div>

        <div class="scene s3" id="scene3">
          <div class="label" id="s3-label">SAJU · KOREAN ASTROLOGY</div>
          <div class="headline" id="s3-headline" style="font-size:96px;">__CTA_LINE__</div>
          <div class="quote" id="s3-quote" style="font-size:36px;">Free reading at sajumuse.com</div>
        </div>

        <div class="caption-track" id="caption-track">__CAPTIONS_HTML__</div>

        <div class="footer-tag">SAJUMUSE · DAILY</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const HEAD_EASE = "__HEAD_EASE__";
      const BODY_EASE = "__BODY_EASE__";

      // Caption fade-in/out — synced to TTS character timestamps
      __CAPTIONS_GSAP__

      tl.from("#s1-energy",   { y: 20, opacity: 0, duration: 0.5, ease: BODY_EASE }, 0.15);
      tl.from("#s1-label",    { y: 30, opacity: 0, duration: 0.5, ease: BODY_EASE }, 0.3);
      tl.from("#s1-bar",      { scaleX: 0, opacity: 0, duration: 0.55, ease: "expo.out" }, 0.55);
      tl.from("#s1-headline", { y: 80, opacity: 0, duration: 0.85, ease: HEAD_EASE }, 0.65);
      tl.from("#s1-quote",    { y: 40, opacity: 0, duration: 0.7, ease: BODY_EASE }, 1.05);

      tl.to("#scene1", { opacity: 0, duration: 0.6, ease: "power2.inOut" }, 8.0);
      tl.set("#scene2", { opacity: 1 }, 8.0);

      tl.from("#s2-label", { y: 30, opacity: 0, duration: 0.5, ease: BODY_EASE }, 8.5);
      tl.from("#s2-bar",   { scaleX: 0, opacity: 0, duration: 0.55, ease: "expo.out" }, 8.75);
      tl.from("#s2-quote", { y: 50, opacity: 0, duration: 0.9, ease: HEAD_EASE }, 8.85);

      tl.to("#scene2", { opacity: 0, duration: 0.6, ease: "power2.inOut" }, 17.0);
      tl.set("#scene3", { opacity: 1 }, 17.0);

      tl.from("#s3-label",    { y: 30, opacity: 0, duration: 0.5, ease: BODY_EASE }, 17.5);
      tl.from("#s3-headline", { y: 60, opacity: 0, duration: 0.8, ease: HEAD_EASE }, 17.8);
      tl.from("#s3-quote",    { y: 30, opacity: 0, duration: 0.6, ease: BODY_EASE }, 18.4);

      tl.to("#scene3", { opacity: 0, duration: 0.7, ease: "power2.inOut" }, 24.2);

      // Ambient slow pulse — finite repeats, calculated from duration
      const cycle = 8;
      const repeats = Math.ceil(25 / cycle) - 1;
      tl.to("#ambient", {
        opacity: 0.55,
        duration: cycle / 2,
        ease: "sine.inOut",
        yoyo: true,
        repeat: repeats * 2 + 1,
      }, 0);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
