<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>__THEME_ROOT__</style>
    <style>__AMBIENT_CSS__</style>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: var(--canvas);
        font-family: "EB Garamond", serif;
        color: var(--ink);
      }
      .canvas { position: relative; width: 100%; height: 100%; overflow: hidden; }
      .ambient { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
      .scene {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 180px 80px;
        gap: 36px;
        z-index: 2;
      }
      .label {
        font-family: "JetBrains Mono", monospace;
        font-size: 30px;
        letter-spacing: 0.22em;
        color: var(--accent);
        text-transform: uppercase;
      }
      .energy-chip {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        letter-spacing: 0.22em;
        color: var(--chip);
        text-transform: uppercase;
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 0;
        line-height: 0.86;
      }
      .stack-line {
        font-family: "Archivo Black", sans-serif;
        font-size: 260px;
        letter-spacing: -0.04em;
        color: var(--ink);
        text-transform: uppercase;
        overflow: hidden;
        line-height: 0.92;
      }
      .stack-line.outline {
        color: transparent;
        -webkit-text-stroke: 3px var(--accent);
      }
      .stack-line.accent { color: var(--accent); }
      .quote {
        font-family: "EB Garamond", serif;
        font-style: italic;
        font-size: 50px;
        line-height: 1.32;
        max-width: 920px;
        color: var(--ink);
      }
      .quote.lead { font-size: 64px; line-height: 1.2; max-width: 940px; }
      .accent-mark {
        width: 30px; height: 30px;
        background: var(--accent);
        border-radius: 50%;
        margin-bottom: 8px;
      }
      .footer-tag {
        position: absolute;
        bottom: 60px;
        left: 80px;
        right: 80px;
        display: flex;
        justify-content: space-between;
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        letter-spacing: 0.22em;
        color: var(--border);
        text-transform: uppercase;
        z-index: 3;
      }
      .caption-track {
        position: absolute;
        left: 80px;
        right: 80px;
        bottom: 160px;
        z-index: 4;
        min-height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .caption {
        position: absolute;
        left: 0; right: 0;
        text-align: center;
        font-family: "Archivo Black", sans-serif;
        font-size: 54px;
        line-height: 1.15;
        letter-spacing: -0.01em;
        color: var(--ink);
        text-shadow: 0 4px 24px rgba(0,0,0,0.7), 0 0 40px rgba(0,0,0,0.5);
        padding: 0 40px;
      }
      .scene { opacity: 1; }
      .s2, .s3 { opacity: 0; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="__TOTAL_DURATION__"
      data-width="1080"
      data-height="1920"
    >
      __AUDIO_HTML__
      <div class="canvas">
        <div class="ambient" id="ambient">__AMBIENT_HTML__</div>

        <div class="scene s1" id="scene1">
          <div class="energy-chip" id="s1-energy">__ENERGY_LABEL__</div>
          <div class="label" id="s1-label">__DATE_LABEL__</div>
          <div class="stack">
            <div class="stack-line outline" id="s1-line1">YEAR</div>
            <div class="stack-line accent" id="s1-line2">OF</div>
            <div class="stack-line" id="s1-line3">__SIGN_HEADLINE__</div>
          </div>
          <div class="quote" id="s1-sub" style="font-size:38px;">__SIGN_SUBLINE__</div>
        </div>

        <div class="scene s2" id="scene2">
          <div class="accent-mark" id="s2-mark"></div>
          <div class="label" id="s2-label">YOUR READING</div>
          <div class="quote lead" id="s2-quote">__FORTUNE_TEXT__</div>
        </div>

        <div class="scene s3" id="scene3">
          <div class="energy-chip" id="s3-energy">__ENERGY_LABEL__</div>
          <div class="stack">
            <div class="stack-line accent" id="s3-line1" style="font-size:140px;">__CTA_LINE__</div>
          </div>
          <div class="quote" id="s3-url" style="font-style:normal;font-family:'JetBrains Mono',monospace;font-size:38px;letter-spacing:0.10em;">sajumuse.com</div>
        </div>

        <div class="caption-track" id="caption-track">__CAPTIONS_HTML__</div>

        <div class="footer-tag">
          <span>SAJUMUSE</span>
          <span>· DAILY ·</span>
          <span>KR</span>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const HEAD_EASE = "__HEAD_EASE__";
      const BODY_EASE = "__BODY_EASE__";

      __CAPTIONS_GSAP__

      // Scene 1 — kinetic stack: 3 lines slam in with overshoot then settle
      tl.from("#s1-energy", { y: 20, opacity: 0, duration: 0.45, ease: BODY_EASE }, 0.1);
      tl.from("#s1-label",  { y: 30, opacity: 0, duration: 0.45, ease: BODY_EASE }, 0.25);

      // Word-by-word slam
      tl.from("#s1-line1", { yPercent: 100, opacity: 0, duration: 0.55, ease: "power4.out" }, 0.45);
      tl.from("#s1-line2", { yPercent: 100, opacity: 0, duration: 0.55, ease: "power4.out" }, 0.65);
      tl.from("#s1-line3", { yPercent: 100, opacity: 0, duration: 0.7,  ease: HEAD_EASE  }, 0.85);

      tl.from("#s1-sub", { y: 30, opacity: 0, duration: 0.6, ease: BODY_EASE }, 1.45);

      tl.to("#scene1", { opacity: 0, duration: 0.6, ease: "power2.inOut" }, 7.5);
      tl.set("#scene2", { opacity: 1 }, 7.5);

      tl.from("#s2-mark",  { scale: 0, opacity: 0, duration: 0.5, ease: "back.out(2)" }, 7.9);
      tl.from("#s2-label", { x: -30, opacity: 0, duration: 0.5, ease: BODY_EASE }, 8.05);
      tl.from("#s2-quote", { y: 60, opacity: 0, duration: 0.9, ease: HEAD_EASE }, 8.25);

      tl.to("#scene2", { opacity: 0, duration: 0.6, ease: "power2.inOut" }, 15.0);
      tl.set("#scene3", { opacity: 1 }, 15.0);

      tl.from("#s3-energy", { y: 20, opacity: 0, duration: 0.5, ease: BODY_EASE }, 15.4);
      tl.from("#s3-line1",  { yPercent: 100, opacity: 0, duration: 0.7, ease: HEAD_EASE }, 15.6);
      tl.from("#s3-url",    { y: 30, opacity: 0, duration: 0.6, ease: BODY_EASE }, 16.2);

      tl.to("#scene3", { opacity: 0, duration: 0.6, ease: "power2.inOut" }, 21.3);

      const cycle = 8;
      const repeats = Math.ceil(22 / cycle) - 1;
      tl.to("#ambient", {
        opacity: 0.55,
        duration: cycle / 2,
        ease: "sine.inOut",
        yoyo: true,
        repeat: repeats * 2 + 1,
      }, 0);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
